<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MHT Image Extractor</title>

<style>
body{
background:#0f001f;
color:#e0e0ff;
font-family:system-ui;
text-align:center;
padding:40px;
}
button{
padding:12px 20px;
font-size:16px;
margin-top:20px;
}
</style>
</head>

<body>

<h2>MHT Image Extractor</h2>

<input type="file" id="file" accept=".mht,.mhtml">
<br>
<button onclick="extract()">Extract</button>

<script>

async function extract(){

let file=document.getElementById("file").files[0]
if(!file) return

let text=await file.text()

let boundary=text.match(/boundary="(.+?)"/i)
if(!boundary){
alert("Boundary not found")
return
}

boundary="--"+boundary[1]

let parts=text.split(boundary)

let count=1

for(let part of parts){

if(!part.includes("Content-Type: image")) continue

let base64=part.split("\n\n")[1]
if(!base64) continue

base64=base64.trim()

let type="jpeg"
let typeMatch=part.match(/Content-Type:\s*image\/(\w+)/i)
if(typeMatch) type=typeMatch[1]

let data="data:image/"+type+";base64,"+base64

// open new tab
window.open(data)

let a=document.createElement("a")
a.href=data
a.download=String(count).padStart(3,"0")+".webp"
a.click()

count++

}

alert(count-1+" images extracted")

}

</script>

</body>
</html>
