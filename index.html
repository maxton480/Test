<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MHT to WEBP Extractor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
background:#0f001f;
color:#e0e0ff;
font-family:system-ui;
text-align:center;
padding:40px;
}

button{
padding:12px 25px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}

#log{
margin-top:20px;
}
</style>
</head>

<body>

<h2>MHT → Ordered WEBP Extractor</h2>

<input type="file" id="file" accept=".mht,.mhtml">
<br>
<button onclick="extract()">Extract Images</button>

<div id="log"></div>

<script>

async function extract(){

let file = document.getElementById("file").files[0]
if(!file) return

let text = await file.text()

let regex = /data:image\/(png|jpeg|jpg|webp|gif);base64,([A-Za-z0-9+/=]+)/g

let images=[]
let match

while(match = regex.exec(text)){
images.push(match[0])
}

document.getElementById("log").innerText="Images found: "+images.length

let zip = new JSZip()

for(let i=0;i<images.length;i++){

let img = new Image()
img.src = images[i]

await new Promise(r=>img.onload=r)

let canvas = document.createElement("canvas")
canvas.width = img.width
canvas.height = img.height

let ctx = canvas.getContext("2d")
ctx.drawImage(img,0,0)

let blob = await new Promise(res=>canvas.toBlob(res,"image/webp",0.95))

let num = String(i+1).padStart(3,"0")

zip.file(num+".webp",blob)

}

let content = await zip.generateAsync({type:"blob"})

let a=document.createElement("a")
a.href=URL.createObjectURL(content)
a.download="images.zip"
a.click()

document.getElementById("log").innerText+="\nDownload ready"

}

</script>

</body>
</html>
