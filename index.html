<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MHT Extractor</title>

<style>
body{
background:#0f001f;
color:#e0e0ff;
font-family:system-ui;
text-align:center;
padding:40px;
}
button{
padding:12px 25px;
font-size:16px;
margin-top:20px;
}
</style>

</head>
<body>

<h2>MHT Image Extractor</h2>

<input type="file" id="file" accept=".mht,.mhtml">
<br>
<button onclick="extract()">Extract Images</button>

<script>

function base64ToBlob(base64,type){

base64 = base64.replace(/\s+/g,"")

let binary = atob(base64)
let len = binary.length
let bytes = new Uint8Array(len)

for(let i=0;i<len;i++){
bytes[i] = binary.charCodeAt(i)
}

return new Blob([bytes],{type:type})

}

async function extract(){

let file=document.getElementById("file").files[0]
if(!file) return

let text=await file.text()

let boundary=text.match(/boundary="(.+?)"/i)
if(!boundary){
alert("Boundary not found")
return
}

boundary="--"+boundary[1]

let parts=text.split(boundary)

let index=1

for(let part of parts){

if(!part.includes("Content-Type: image")) continue

let typeMatch=part.match(/Content-Type:\s*image\/([^\s;]+)/i)
if(!typeMatch) continue

let type="image/"+typeMatch[1]

let data=part.split("\n\n")[1]
if(!data) continue

data=data.trim()

let blob=base64ToBlob(data,type)

let url=URL.createObjectURL(blob)

window.open(url)

let a=document.createElement("a")
a.href=url
a.download=String(index).padStart(3,"0")+"."+typeMatch[1]
a.click()

index++

}

alert((index-1)+" images extracted")

}

</script>

</body>
</html>
