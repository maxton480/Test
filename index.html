<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comic Image Extractor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
  <h2>Comic Image Extractor</h2>
  <input type="text" id="urlInput" placeholder="Enter comic episode URL">
  <button onclick="extractImages()">Extract Images</button>

  <script>
    async function extractImages() {
      const url = document.getElementById('urlInput').value;
      if (!url) {
        alert('Please enter a URL');
        return;
      }

      try {
        const response = await fetch(url);
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Find all image elements (adjust selector if needed)
        const images = doc.querySelectorAll('img');
        const imageUrls = Array.from(images).map(img => img.src);

        // Download and zip images
        const zip = new JSZip();
        const promises = imageUrls.map(async (src, index) => {
          const imgResponse = await fetch(src);
          const blob = await imgResponse.blob();
          zip.file(`image_${index + 1}.${src.split('.').pop()}`, blob);
        });

        await Promise.all(promises);
        const content = await zip.generateAsync({type: 'blob'});
        saveAs(content, 'comic_images.zip');
      } catch (error) {
        console.error('Error extracting images:', error);
        alert('Failed to extract images. Check console for details.');
      }
    }
  </script>
</body>
</html>
